<!-- Note: This is a static frontend UI design portfolio project. No data is collected. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend UI Practice: Login Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="form-container">
            
            <div class="form-blob">
                <img src="/projects/login/assets/blob.svg" alt="blob" class="blob-image blob-image-1">
                <img src="/projects/login/assets/blob.svg" alt="blob" class="blob-image blob-image-2">
                <img src="/projects/login/assets/blob.svg" alt="blob" class="blob-image blob-image-3">
            </div>

            <div class="form-header">
                <p>Please enter your details</p>
                <h1>Welcome Back</h1>
            </div>

            <form action="" class="form-box">
                
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder=" " required>
                    <label for="email" class="floating-label">Email address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="floating-label">Password</label>
                    <div class="eye-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                </div>

                <div class="input-group checkbox-group">
                    <div class="form-col remember-me">
                        <input type="checkbox" id="remember-me" class="checkbox-field">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <div class="form-col forgot-password">
                        <a href="#" class="form-link">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>

                <div class="social-login-separator">
                    <span>Or</span>
                </div>

                <div class="social-login-buttons">
                    <a href="#" class="social-btn google-btn">
                        <img src="assets/google icon.png" alt="Google Logo">
                    </a>
                    <a href="#" class="social-btn facebook-btn">
                        <img src="assets/facebook icon.png" alt="Facebook Logo">
                    </a>
                    <a href="#" class="social-btn apple-btn">
                        <img src="assets/apple icon.png" alt="Apple Logo">
                    </a>
                </div>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" class="form-link sign-up-link">Sign up</a></p>
                </div>

            </form>

        </div>
    </div>

    </body>
</html>
